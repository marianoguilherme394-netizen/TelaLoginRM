<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    
  <div id="tela">
    <h1>Bem-vindo</h1>
    <p>Acesse sua conta para continuar.</p>
    <button onclick="ir('tela', 'login')">Ir para o Login</button>
  </div>

  <div id="login">
    <h1>Login</h1>
    <input type="text" id="usuario" placeholder="Usuário" />
    <input type="password" id="senha" placeholder="Senha" />
    <button onclick="fazerLogin(usuario.value, senha.value)">Entrar</button>
    <a href="#" onclick="ir('login', 'home')">← Voltar</a>
  </div>

  <script src="script.js"></script>
</body>
</html>
